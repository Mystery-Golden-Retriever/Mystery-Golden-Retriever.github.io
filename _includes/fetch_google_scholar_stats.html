<script>
  // Fetch Google Scholar citation count via Semantic Scholar API (CORS-friendly)
  document.addEventListener('DOMContentLoaded', function() {
    // Fetch citation count from Semantic Scholar using the author's papers
    // Google Scholar ID: AQuXJEkAAAAJ
    var scholarUrl = 'https://scholar.google.com/citations?user=AQuXJEkAAAAJ&hl=en';
    
    // Use a CORS proxy to fetch the Google Scholar page
    var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(scholarUrl);
    
    fetch(proxyUrl)
      .then(function(response) { return response.text(); })
      .then(function(html) {
        // Parse citation count from the Google Scholar page
        // Look for the "Cited by" count in the stats table
        var match = html.match(/Citations<\/a><\/td><td class="gsc_rsb_std">(\d+)<\/td>/);
        if (match && match[1]) {
          var totalCitations = parseInt(match[1]);
          var citEl = document.getElementById('total_cit');
          if (citEl) {
            citEl.textContent = totalCitations;
          }
        }
      })
      .catch(function(err) {
        console.log('Could not fetch citation count:', err);
        // Keep the static fallback value
      });
  });
</script>
